<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>EmotiCam — Lobby</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet"/>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#070b14;--surface:#0d1424;--card:#0f1729;
  --border:#1e2d45;--accent:#00d4ff;--accent2:#ff3cac;
  --green:#00ff88;--yellow:#fbbf24;--text:#e2e8f0;--muted:#64748b;
}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;}
.bg-fx{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
.orb{position:absolute;border-radius:50%;filter:blur(100px);opacity:0.15;animation:drift 10s ease-in-out infinite;}
.orb1{width:500px;height:500px;background:#00d4ff;top:-150px;left:-150px;}
.orb2{width:400px;height:400px;background:#ff3cac;bottom:-100px;right:-100px;animation-delay:4s;}
.orb3{width:300px;height:300px;background:#7c3aed;top:40%;right:20%;animation-delay:2s;}
@keyframes drift{0%,100%{transform:translate(0,0);}50%{transform:translate(20px,-15px);}}

nav{
  position:relative;z-index:10;
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 40px;border-bottom:1px solid var(--border);
  background:rgba(7,11,20,0.8);backdrop-filter:blur(12px);
}
.nav-logo{font-size:1.4rem;font-weight:900;letter-spacing:-0.5px;}
.nav-logo span{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.nav-user{display:flex;align-items:center;gap:12px;}
.user-pill{
  display:flex;align-items:center;gap:8px;
  background:var(--card);border:1px solid var(--border);
  border-radius:999px;padding:7px 14px;font-size:0.85rem;
}
.user-avatar{font-size:1.2rem;}
.btn-logout{
  padding:7px 16px;border:1px solid var(--border);
  border-radius:999px;background:transparent;
  color:var(--muted);font-family:'Outfit',sans-serif;
  font-size:0.8rem;cursor:pointer;transition:all 0.2s;text-decoration:none;
}
.btn-logout:hover{border-color:var(--accent2);color:var(--accent2);}

main{
  position:relative;z-index:1;
  max-width:900px;margin:0 auto;padding:50px 24px;
}
.hero{text-align:center;margin-bottom:56px;}
.hero h2{font-size:2.8rem;font-weight:900;letter-spacing:-1.5px;margin-bottom:12px;}
.hero h2 span{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.hero p{color:var(--muted);font-size:1rem;max-width:400px;margin:0 auto;}

.action-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:48px;}
.action-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:20px;padding:36px 32px;text-align:center;
  transition:all 0.3s;position:relative;overflow:hidden;
}
.action-card:hover{transform:translateY(-4px);border-color:var(--accent);}
.card-icon{font-size:3rem;margin-bottom:14px;}
.card-title{font-size:1.3rem;font-weight:700;margin-bottom:8px;}
.card-desc{color:var(--muted);font-size:0.85rem;margin-bottom:24px;}

.btn-create{
  width:100%;padding:13px;
  background:linear-gradient(135deg,var(--accent),#0099cc);
  border:none;border-radius:12px;color:#000;
  font-weight:700;cursor:pointer;
}
.join-input-row{display:flex;gap:8px;}
.code-input{
  flex:1;padding:12px;text-align:center;
  border-radius:12px;border:1px solid var(--border);
  background:rgba(255,255,255,0.04);color:var(--text);
}
.btn-join{
  padding:12px 18px;
  background:linear-gradient(135deg,var(--accent2),#cc0077);
  border:none;border-radius:12px;color:#fff;
  font-weight:700;cursor:pointer;
}
</style>
</head>

<body>

<div class="bg-fx">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<nav>
  <div class="nav-logo">Emoti<span>Cam</span> 🎭</div>
  <div class="nav-user">
    <div class="user-pill">
      <span class="user-avatar">{{ avatar }}</span>
      <span>{{ username }}</span>
    </div>
    <a href="/logout" class="btn-logout">Sign out</a>
  </div>
</nav>

<main>
  <div class="hero">
    <h2>Start a <span>Video Call</span></h2>
    <p>Create or join a room</p>
  </div>

  <div class="action-grid">

    <!-- CREATE -->
    <div class="action-card">
      <div class="card-icon">🚀</div>
      <div class="card-title">Create Room</div>
      <div class="card-desc">Start a new call</div>
      <button class="btn-create" onclick="createRoom()">Create New Room</button>
    </div>

    <!-- JOIN -->
    <div class="action-card">
      <div class="card-icon">🔗</div>
      <div class="card-title">Join Room</div>
      <div class="card-desc">Enter code</div>
      <div class="join-input-row">
        <input id="joinCode" class="code-input" placeholder="ABC123"/>
        <button class="btn-join" onclick="joinRoom()">Join</button>
      </div>
    </div>

  </div>
</main>

<script>
/* ✅ FIXED VERSION */

async function createRoom() {
  try {
    const res = await fetch('/api/create_room', {method:'POST'});
    const data = await res.json();

    if (data.code) {
      window.location.href = '/room/' + data.code;
    } else {
      alert("Error creating room");
    }
  } catch(e) {
    console.error(e);
    alert("Server error");
  }
}

async function joinRoom() {
  const code = document.getElementById('joinCode').value.trim();

  if (!code) {
    alert("Enter code");
    return;
  }

  try {
    const res = await fetch('/api/join_room', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({code})
    });

    const data = await res.json();

    if (data.code) {
      window.location.href = '/room/' + data.code;
    } else {
      alert(data.error || "Room not found");
    }
  } catch(e) {
    console.error(e);
    alert("Server error");
  }
}
</script>

</body>
</html>
