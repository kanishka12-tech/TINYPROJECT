<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>EmotiCam — {{ room_code }}</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
<style>
/* ═══════════════════════════════════════════════════════ BASE */
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#070b14; --surface:#0d1424; --card:#0f1729;
  --border:#1e2d45; --accent:#00d4ff; --accent2:#ff3cac;
  --green:#00ff88; --yellow:#fbbf24; --red:#ef4444;
  --text:#e2e8f0; --muted:#64748b;
}
body{
  background:var(--bg); color:var(--text);
  font-family:'Outfit',sans-serif;
  height:100dvh; display:flex; flex-direction:column; overflow:hidden;
}

/* ═══════════════════════════════════════════════════ TOPBAR */
.topbar{
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 20px; border-bottom:1px solid var(--border);
  background:rgba(7,11,20,0.95); backdrop-filter:blur(16px);
  flex-shrink:0; z-index:30;
}
.topbar-left{display:flex;align-items:center;gap:14px;}
.logo-sm{font-size:1.05rem;font-weight:900;}
.logo-sm span{background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.room-badge{
  display:flex;align-items:center;gap:6px;
  background:var(--card);border:1px solid var(--border);
  border-radius:8px;padding:4px 12px;font-size:0.75rem;
}
.room-badge .code{font-weight:700;letter-spacing:2px;color:var(--accent);}
.copy-btn{
  background:none;border:none;color:var(--muted);cursor:pointer;
  font-size:0.7rem;padding:2px 6px;border-radius:4px;
  transition:all 0.2s;font-family:'Outfit',sans-serif;
}
.copy-btn:hover{color:var(--accent);}
.live-dot{
  width:7px;height:7px;border-radius:50%;background:var(--green);
  box-shadow:0 0 8px var(--green);animation:pulse 1.5s infinite;
}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.35;}}

.topbar-right{display:flex;align-items:center;gap:8px;}
.stat-pill{
  display:flex;align-items:center;gap:5px;
  background:var(--card);border:1px solid var(--border);
  border-radius:6px;padding:3px 9px;font-size:0.7rem;color:var(--muted);
}
#statFps{color:var(--accent);}
.btn-leave{
  padding:6px 14px;background:rgba(239,68,68,0.12);
  border:1px solid rgba(239,68,68,0.35);border-radius:8px;
  color:#fca5a5;font-family:'Outfit',sans-serif;
  font-size:0.78rem;font-weight:600;cursor:pointer;transition:all 0.2s;
}
.btn-leave:hover{background:rgba(239,68,68,0.28);}

/* ═══════════════════════════════════════════════════ BODY */
.room-body{display:flex;flex:1;overflow:hidden;min-height:0;}

/* ─── VIDEO AREA ─── */
.video-area{
  flex:1;display:flex;flex-direction:column;
  padding:12px;gap:10px;overflow:hidden;min-width:0;
}
.video-grid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:10px;flex:1;min-height:0;
}

/* Each video panel */
.video-panel{
  background:#000;border:1px solid var(--border);
  border-radius:16px;overflow:hidden;position:relative;
  transition:border-color 0.4s, box-shadow 0.4s;
}
/* Emotion glow — class added via JS */
.video-panel.glow-happy  {border-color:#22c55e;box-shadow:0 0 18px rgba(34,197,94,.35);}
.video-panel.glow-sad    {border-color:#60a5fa;box-shadow:0 0 18px rgba(96,165,250,.35);}
.video-panel.glow-angry  {border-color:#ef4444;box-shadow:0 0 18px rgba(239,68,68,.35);}
.video-panel.glow-fear   {border-color:#a78bfa;box-shadow:0 0 18px rgba(167,139,250,.35);}
.video-panel.glow-surprise{border-color:#fbbf24;box-shadow:0 0 18px rgba(251,191,36,.35);}
.video-panel.glow-neutral {border-color:var(--border);box-shadow:none;}
.video-panel.glow-excited {border-color:#f97316;box-shadow:0 0 18px rgba(249,115,22,.35);}

/* The actual <video> fills the panel */
.video-panel video{
  width:100%;height:100%;object-fit:cover;
  display:block;position:absolute;inset:0;
}
/* Canvas OVERLAID on top — transparent background */
.video-panel canvas.overlay{
  position:absolute;inset:0;
  width:100%;height:100%;pointer-events:none;
}
/* Hidden capture canvas */
#captureCanvas{display:none;}

.vid-label{
  position:absolute;top:9px;left:9px;z-index:10;
  background:rgba(0,0,0,0.6);border:1px solid var(--border);
  border-radius:6px;padding:3px 9px;font-size:0.65rem;
  color:var(--muted);text-transform:uppercase;letter-spacing:1px;
}
.emotion-badge{
  position:absolute;bottom:9px;left:9px;z-index:10;
  display:flex;align-items:center;gap:5px;
  background:rgba(0,0,0,0.7);border-radius:8px;
  padding:4px 10px;font-size:0.75rem;font-weight:600;
  transition:all 0.3s;opacity:0;
}
.emotion-badge.visible{opacity:1;}
.emotion-badge .emo-icon{font-size:1rem;}
#fps-badge{
  position:absolute;bottom:9px;right:9px;z-index:10;
  background:rgba(0,0,0,0.6);border-radius:6px;
  padding:3px 8px;font-size:0.62rem;color:var(--accent);
}

/* ─── INFO STRIP ─── */
.info-strip{
  display:grid;grid-template-columns:1fr 1fr 1fr;
  gap:8px;flex-shrink:0;
}
.info-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:10px;padding:10px 14px;
  display:flex;align-items:center;gap:10px;
  transition:border-color 0.3s;
}
.info-emoji{font-size:1.7rem;flex-shrink:0;transition:all 0.3s;}
.info-text .lbl{font-size:0.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.info-text .val{font-size:0.9rem;font-weight:700;margin-top:2px;transition:color 0.3s;}
.info-text .score{font-size:0.65rem;color:var(--muted);margin-top:1px;}

/* ─── SIDEBAR ─── */
.sidebar{
  width:290px;flex-shrink:0;
  border-left:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
.sidebar-tabs{
  display:flex;border-bottom:1px solid var(--border);flex-shrink:0;
}
.tab{
  flex:1;padding:10px 4px;text-align:center;font-size:0.75rem;
  font-weight:600;cursor:pointer;color:var(--muted);
  border-bottom:2px solid transparent;transition:all 0.2s;
}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}

.tab-content{flex:1;overflow:hidden;display:none;flex-direction:column;}
.tab-content.active{display:flex;}

/* emotion bars */
.emo-bars{flex:1;overflow-y:auto;padding:12px;}
.emo-bar-row{display:flex;align-items:center;gap:7px;margin-bottom:9px;font-size:0.75rem;}
.emo-bar-label{width:68px;color:var(--muted);text-transform:capitalize;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.emo-bar-track{flex:1;height:6px;background:var(--border);border-radius:99px;overflow:hidden;}
.emo-bar-fill{height:100%;border-radius:99px;transition:width 0.45s ease;}
.emo-bar-pct{width:30px;text-align:right;color:var(--muted);font-size:0.63rem;}

/* gesture panel */
.gesture-panel{flex:1;overflow-y:auto;padding:12px;}
.gesture-detected{
  display:flex;align-items:center;gap:10px;
  background:rgba(0,212,255,0.05);border:1px solid rgba(0,212,255,0.18);
  border-radius:10px;padding:11px;margin-bottom:8px;
}
.g-emoji{font-size:1.7rem;}
.g-name{font-weight:600;font-size:0.87rem;}
.g-side{font-size:0.7rem;color:var(--muted);}
.no-gesture{color:var(--muted);font-size:0.8rem;text-align:center;padding:16px 0;}
.gesture-ref-title{font-size:0.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin:10px 0 6px;}
.gesture-grid-ref{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;}
.g-ref-item{
  background:var(--surface);border:1px solid var(--border);
  border-radius:7px;padding:5px 3px;text-align:center;
}
.g-ref-item span.re{font-size:1.2rem;display:block;}
.g-ref-item span.rl{font-size:0.48rem;color:var(--muted);display:block;margin-top:2px;}

/* chat */
.chat-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.chat-messages{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:7px;}
.chat-msg{
  background:var(--surface);border-radius:10px;
  padding:7px 11px;font-size:0.8rem;max-width:92%;
}
.chat-msg.me{align-self:flex-end;background:rgba(0,212,255,0.09);border:1px solid rgba(0,212,255,0.18);}
.chat-msg .msg-header{display:flex;align-items:center;gap:5px;margin-bottom:3px;}
.chat-msg .msg-avatar{font-size:0.85rem;}
.chat-msg .msg-user{font-weight:600;font-size:0.7rem;color:var(--accent);}
.chat-msg .msg-time{font-size:0.6rem;color:var(--muted);margin-left:auto;}
.chat-msg .msg-text{color:var(--text);line-height:1.4;}
.chat-input-row{
  display:flex;gap:7px;padding:10px;
  border-top:1px solid var(--border);flex-shrink:0;
}
.chat-input{
  flex:1;padding:8px 11px;
  background:rgba(255,255,255,0.04);
  border:1px solid var(--border);border-radius:9px;
  color:var(--text);font-family:'Outfit',sans-serif;font-size:0.82rem;
  outline:none;transition:all 0.2s;
}
.chat-input:focus{border-color:var(--accent);}
.btn-send{
  padding:8px 13px;background:var(--accent);
  border:none;border-radius:9px;color:#000;
  font-weight:700;font-size:0.82rem;cursor:pointer;transition:all 0.2s;
}
.btn-send:hover{background:#00b8e0;}

/* members */
.members-panel{flex:1;overflow-y:auto;padding:12px;}
.member-item{
  display:flex;align-items:center;gap:9px;
  padding:9px 11px;border-radius:9px;
  background:var(--surface);margin-bottom:7px;font-size:0.82rem;
}
.member-av{font-size:1.3rem;}
.member-name{font-weight:600;}
.member-you{font-size:0.65rem;color:var(--accent);margin-left:4px;}
.host-badge{font-size:0.6rem;color:var(--yellow);margin-left:4px;}

/* controls */
.controls-bar{
  display:flex;align-items:center;justify-content:center;gap:10px;
  padding:10px 16px;border-top:1px solid var(--border);
  background:rgba(7,11,20,0.9);flex-shrink:0;
}
.ctrl-btn{
  width:44px;height:44px;border-radius:50%;
  border:1px solid var(--border);background:var(--card);
  color:var(--text);font-size:1.05rem;cursor:pointer;
  transition:all 0.2s;display:flex;align-items:center;justify-content:center;
}
.ctrl-btn:hover{border-color:var(--accent);background:rgba(0,212,255,0.08);}
.ctrl-btn.active{background:rgba(0,212,255,0.14);border-color:var(--accent);}
.ctrl-btn.danger{border-color:rgba(239,68,68,0.38);color:#fca5a5;}
.ctrl-btn.danger:hover{background:rgba(239,68,68,0.14);}
.ctrl-btn.off{background:rgba(239,68,68,0.1);border-color:rgba(239,68,68,0.4);}

/* scrollbar */
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

/* ═══════════════════════════ FLOATING EMOJI ANIMATION */
.float-emoji{
  position:fixed;font-size:2rem;pointer-events:none;z-index:999;
  animation:floatUp 2s ease-out forwards;
}
@keyframes floatUp{
  0%  {opacity:1;transform:translateY(0) scale(1);}
  100%{opacity:0;transform:translateY(-120px) scale(1.6);}
}
</style>
</head>

<body>

<!-- ════════════════════════════════════════════ TOPBAR -->
<nav class="topbar">
  <div class="topbar-left">
    <div class="logo-sm">Emoti<span>Cam</span> 🎭</div>
    <div class="room-badge">
      <div class="live-dot"></div>
      <span class="code" id="codeDisplay">{{ room_code }}</span>
      <button class="copy-btn" onclick="copyCode()">📋 Copy</button>
    </div>
  </div>
  <div class="topbar-right">
    <div class="stat-pill">⚡ <span id="statFps">0 fps</span></div>
    <div class="stat-pill" id="memberCountBadge">1 member</div>
    <button class="btn-leave" onclick="leaveRoom()">🚪 Leave</button>
  </div>
</nav>

<!-- ════════════════════════════════════════════ BODY -->
<div class="room-body">

  <!-- ── VIDEO + INFO ── -->
  <div class="video-area">
    <div class="video-grid">

      <!-- MY VIDEO -->
      <div class="video-panel" id="myPanel">
        <video id="rawVideo" autoplay muted playsinline></video>
        <canvas class="overlay" id="myOverlay"></canvas>
        <div class="vid-label">You — {{ username }}</div>
        <div class="emotion-badge" id="myEmoBadge">
          <span class="emo-icon" id="myEmoIcon">😐</span>
          <span id="myEmoLabel">—</span>
        </div>
        <div id="fps-badge">0 fps</div>
      </div>

      <!-- REMOTE / PREVIEW -->
      <div class="video-panel" id="remotePanel">
        <video id="remoteVideo" autoplay playsinline style="display:none"></video>
        <canvas id="remoteCanvas" style="width:100%;height:100%;object-fit:cover;display:block;position:absolute;inset:0;"></canvas>
        <div class="vid-label">Room Feed</div>
        <div class="emotion-badge" id="remoteEmoBadge">
          <span class="emo-icon" id="remoteEmoIcon">😐</span>
          <span id="remoteEmoLabel">—</span>
        </div>
      </div>

    </div><!-- /video-grid -->

    <!-- INFO STRIP -->
    <div class="info-strip">
      <div class="info-card" id="cardEmotion">
        <span class="info-emoji" id="emoEmoji">😐</span>
        <div class="info-text">
          <div class="lbl">Emotion</div>
          <div class="val" id="emoLabel">Detecting…</div>
          <div class="score" id="emoScore">—</div>
        </div>
      </div>
      <div class="info-card" id="cardGesture">
        <span class="info-emoji" id="handEmoji">✋</span>
        <div class="info-text">
          <div class="lbl">Gesture</div>
          <div class="val" id="handLabel">No hand</div>
          <div class="score" id="handSide">—</div>
        </div>
      </div>
      <div class="info-card">
        <span class="info-emoji">📡</span>
        <div class="info-text">
          <div class="lbl">Room</div>
          <div class="val" id="roomCodeStrip">{{ room_code }}</div>
          <div class="score" id="roomHost">Host: {{ room_info.host }}</div>
        </div>
      </div>
    </div>

  </div><!-- /video-area -->

  <!-- ── SIDEBAR ── -->
  <div class="sidebar">
    <div class="sidebar-tabs">
      <div class="tab active" onclick="switchTab('chat',this)">💬 Chat</div>
      <div class="tab" onclick="switchTab('emotions',this)">🧠 Emotion</div>
      <div class="tab" onclick="switchTab('gestures',this)">✋ Gestures</div>
      <div class="tab" onclick="switchTab('members',this)">👥 People</div>
    </div>

    <!-- CHAT -->
    <div class="tab-content active" id="tab-chat">
      <div class="chat-panel">
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-row">
          <input id="chatInput" class="chat-input" placeholder="Message…"
                 onkeydown="if(event.key==='Enter')sendChat()"/>
          <button class="btn-send" onclick="sendChat()">➤</button>
        </div>
      </div>
    </div>

    <!-- EMOTION BARS -->
    <div class="tab-content" id="tab-emotions">
      <div class="emo-bars" id="emoBars">
        <p style="color:var(--muted);font-size:0.8rem;text-align:center;padding:20px 0;">Start camera to see emotion data</p>
      </div>
    </div>

    <!-- GESTURES -->
    <div class="tab-content" id="tab-gestures">
      <div class="gesture-panel">
        <div class="gesture-ref-title">Detected</div>
        <div id="detectedGestures"><div class="no-gesture">No gestures detected</div></div>
        <div class="gesture-ref-title">Reference</div>
        <div class="gesture-grid-ref" id="gestureRef"></div>
      </div>
    </div>

    <!-- MEMBERS -->
    <div class="tab-content" id="tab-members">
      <div class="members-panel" id="membersList"></div>
    </div>

  </div><!-- /sidebar -->

</div><!-- /room-body -->

<!-- ════════════════════════════════════════════ CONTROLS -->
<div class="controls-bar">
  <button class="ctrl-btn" id="btnCam"    onclick="toggleCamera()" title="Camera">📷</button>
  <button class="ctrl-btn active" id="btnFilter" onclick="toggleFilter()" title="AI Overlay">🧠</button>
  <button class="ctrl-btn" onclick="takeSnapshot()" title="Snapshot">📸</button>
  <button class="ctrl-btn danger" onclick="leaveRoom()" title="Leave">🚪</button>
</div>

<canvas id="captureCanvas"></canvas>

<!-- ════════════════════════════════════════════ SCRIPT -->
<script>
// ── Constants injected safely via Jinja ──────────────────────
const ROOM_CODE = {{ room_code | tojson }};
const MY_NAME   = {{ username  | tojson }};
const MY_AVATAR = {{ avatar    | tojson }};
const ROOM_HOST = {{ room_info.host | tojson }};

// ── Emotion colour map (matches Python EMOTIONS) ─────────────
const EMO_COLORS = {
  happy:'#22c55e',sad:'#60a5fa',angry:'#ef4444',fear:'#a78bfa',
  surprise:'#fbbf24',disgust:'#4ade80',neutral:'#94a3b8',
  excited:'#f97316',love:'#f43f5e',joyful:'#34d399',content:'#6ee7b7',
  calm:'#5eead4',bored:'#64748b',anxious:'#8b5cf6',nervous:'#a78bfa',
  frustrated:'#ea580c',stressed:'#dc2626',hurt:'#93c5fd',lonely:'#6366f1',
  proud:'#818cf8',grateful:'#a3e635',hopeful:'#38bdf8',playful:'#fb923c',
  silly:'#e879f9',confused:'#94a3b8',tired:'#475569',
  embarrassed:'#fb7185',shy:'#f472b6',smug:'#facc15',mischievous:'#a855f7',
};

// Gesture reference data
const GESTURES_REF = [
  {e:'👍',l:'Thumbs Up'},{e:'👎',l:'Thumbs Down'},{e:'✌️',l:'Peace'},
  {e:'👌',l:'OK'},{e:'✊',l:'Fist'},{e:'🖐️',l:'Open'},
  {e:'☝️',l:'Point'},{e:'🤘',l:'Rock'},{e:'🤙',l:'Call'},
  {e:'🤟',l:'Love'},{e:'🤞',l:'Crossed'},{e:'🤌',l:'Pinch'},
  {e:'👋',l:'Wave'},{e:'🙏',l:'Pray'},{e:'🖖',l:'Vulcan'},{e:'🛑',l:'Stop'},
];

// ── State ─────────────────────────────────────────────────────
let stream    = null;
let sending   = false;
let filterOn  = true;
let fpsCount  = 0;
let fpsTimer  = null;
let sendTimer = null;
let members   = [];
let lastFaces = [];
let lastHands = [];
let animFrame = null;

// ── Socket ────────────────────────────────────────────────────
const socket = io({ transports: ['websocket'], upgrade: false });

socket.on('connect', () => {
  socket.emit('join_room_socket', { code: ROOM_CODE });
  addSystemMsg('Connected to room ' + ROOM_CODE);
});

socket.on('disconnect', () => addSystemMsg('Disconnected — reconnecting…'));

socket.on('user_joined', d => {
  members = d.members || [];
  updateMembers();
  if (d.username !== MY_NAME) addSystemMsg('👋 ' + d.username + ' joined');
});

socket.on('user_left', d => {
  members = d.members || [];
  updateMembers();
  addSystemMsg('🚶 ' + d.username + ' left');
});

socket.on('chat_message', addChatMsg);

// ── Detection result — lightweight JSON, no image ─────────────
socket.on('detection_result', data => {
  const faces = data.faces || [];
  const hands = data.hands || [];

  // Store for canvas render loop
  if (data.username === MY_NAME) {
    lastFaces = faces;
    lastHands = hands;
  }

  // Update info strip
  if (faces.length) {
    const f = faces[0];
    updateEmotionUI(f, data.username === MY_NAME ? 'my' : 'remote');
    updateEmoBars(f.all || {});
    triggerGlow(f.emotion);
  }
  if (hands.length) {
    updateGestureUI(hands);
  } else {
    document.getElementById('handEmoji').textContent = '✋';
    document.getElementById('handLabel').textContent = 'No hand';
    document.getElementById('handSide').textContent  = '—';
    document.getElementById('detectedGestures').innerHTML =
      '<div class="no-gesture">No gestures detected</div>';
  }
});

// ── Canvas overlay render loop ────────────────────────────────
// Runs via requestAnimationFrame — draws overlays on top of the live <video>
// No flicker because we never touch the <video> element at all.
function renderLoop() {
  const vid     = document.getElementById('rawVideo');
  const overlay = document.getElementById('myOverlay');
  if (vid.videoWidth && overlay) {
    overlay.width  = vid.videoWidth;
    overlay.height = vid.videoHeight;
    const ctx = overlay.getContext('2d');
    ctx.clearRect(0, 0, overlay.width, overlay.height);
    if (filterOn) {
      drawFaceOverlays(ctx, lastFaces, overlay.width, overlay.height);
      drawHandOverlays(ctx, lastHands, overlay.width, overlay.height);
    }
    fpsCount++;
  }
  animFrame = requestAnimationFrame(renderLoop);
}

// Scale box from 320×240 (detection res) to actual overlay size
function scaleBox(box, ow, oh) {
  const sx = ow / 320, sy = oh / 240;
  return [box[0]*sx, box[1]*sy, box[2]*sx, box[3]*sy];
}

function drawFaceOverlays(ctx, faces, ow, oh) {
  faces.forEach(f => {
    const [x, y, w, h] = scaleBox(f.box, ow, oh);
    const color = f.colorHex || EMO_COLORS[f.emotion] || '#94a3b8';

    // Glow rect
    ctx.save();
    ctx.strokeStyle = color;
    ctx.lineWidth   = 2.5;
    ctx.shadowColor = color;
    ctx.shadowBlur  = 12;
    ctx.strokeRect(x, y, w, h);
    ctx.restore();

    // Emoji above face
    const emoji = f.emoji || '😐';
    const eSize = Math.max(24, Math.min(w * 0.55, 60));
    ctx.font      = `${eSize}px serif`;
    ctx.textAlign = 'center';
    ctx.fillText(emoji, x + w/2, y - 6);

    // Label below
    const label = (f.emotion || '').toUpperCase() + ' ' + Math.round((f.score||0)*100) + '%';
    const fs    = Math.max(10, Math.min(w * 0.13, 14));
    ctx.font      = `bold ${fs}px Outfit, sans-serif`;
    ctx.textAlign = 'left';
    const tw      = ctx.measureText(label).width;
    // pill background
    ctx.save();
    ctx.fillStyle = color + 'cc';
    roundRect(ctx, x, y+h+3, tw+12, fs+10, 4);
    ctx.fill();
    ctx.restore();
    ctx.fillStyle = '#fff';
    ctx.fillText(label, x+6, y+h+fs+7);
  });
}

function drawHandOverlays(ctx, hands, ow, oh) {
  hands.forEach(h => {
    const [x1, y1, x2, y2] = h.bbox.map((v,i) => v * (i%2===0 ? ow/320 : oh/240));
    const color = h.colorHex || '#94a3b8';

    // Draw skeleton landmarks
    if (h.landmarks && h.landmarks.length === 21) {
      // Connections (MediaPipe hand topology)
      const CONNECTIONS = [
        [0,1],[1,2],[2,3],[3,4],           // thumb
        [0,5],[5,6],[6,7],[7,8],            // index
        [0,9],[9,10],[10,11],[11,12],       // middle
        [0,13],[13,14],[14,15],[15,16],     // ring
        [0,17],[17,18],[18,19],[19,20],     // pinky
        [5,9],[9,13],[13,17],               // palm
      ];
      ctx.save();
      ctx.strokeStyle = color;
      ctx.lineWidth   = 1.8;
      ctx.shadowColor = color;
      ctx.shadowBlur  = 5;
      CONNECTIONS.forEach(([a, b]) => {
        const la = h.landmarks[a], lb = h.landmarks[b];
        ctx.beginPath();
        ctx.moveTo(la.x * ow, la.y * oh);
        ctx.lineTo(lb.x * ow, lb.y * oh);
        ctx.stroke();
      });
      ctx.restore();
      // Dots
      h.landmarks.forEach(lm => {
        ctx.beginPath();
        ctx.arc(lm.x * ow, lm.y * oh, 3, 0, Math.PI*2);
        ctx.fillStyle = '#fff';
        ctx.fill();
      });
    }

    // Bounding box
    ctx.save();
    ctx.strokeStyle = color;
    ctx.lineWidth   = 2;
    ctx.shadowColor = color;
    ctx.shadowBlur  = 8;
    ctx.strokeRect(x1, y1, x2-x1, y2-y1);
    ctx.restore();

    // Emoji above hand
    const emoji = h.emoji || '✋';
    const sz    = Math.max(22, Math.min((x2-x1)*0.6, 50));
    ctx.font      = `${sz}px serif`;
    ctx.textAlign = 'center';
    ctx.fillText(emoji, (x1+x2)/2, Math.max(sz+4, y1 - 4));
  });
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.arcTo(x+w, y, x+w, y+r, r);
  ctx.lineTo(x+w, y+h-r);
  ctx.arcTo(x+w, y+h, x+w-r, y+h, r);
  ctx.lineTo(x+r, y+h);
  ctx.arcTo(x, y+h, x, y+h-r, r);
  ctx.lineTo(x, y+r);
  ctx.arcTo(x, y, x+r, y, r);
  ctx.closePath();
}

// ── Camera ────────────────────────────────────────────────────
async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { width: { ideal: 640 }, height: { ideal: 480 }, facingMode: 'user' },
      audio: false,
    });
    const vid = document.getElementById('rawVideo');
    vid.srcObject = stream;
    await vid.play();
    sending = true;
    document.getElementById('btnCam').textContent = '⏹️';
    startSendLoop();
    startFpsCounter();
    if (!animFrame) renderLoop();
    addSystemMsg('📷 Camera started');
  } catch(e) {
    addSystemMsg('Camera error: ' + e.message);
  }
}

function stopCamera() {
  sending = false;
  clearInterval(sendTimer);
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
  clearInterval(fpsTimer);
  document.getElementById('btnCam').textContent = '📷';
  addSystemMsg('Camera stopped');
}

function toggleCamera() {
  sending ? stopCamera() : startCamera();
}

// ── Frame sender — 10 FPS, 320×240, quality 0.65 ─────────────
function startSendLoop() {
  clearInterval(sendTimer);
  const vid = document.getElementById('rawVideo');
  const cap = document.getElementById('captureCanvas');

  sendTimer = setInterval(() => {
    if (!sending || !filterOn || vid.videoWidth === 0) return;
    // Downscale to 320×240 before encoding — saves ~75% bandwidth
    cap.width  = 320;
    cap.height = 240;
    cap.getContext('2d').drawImage(vid, 0, 0, 320, 240);
    const dataURL = cap.toDataURL('image/jpeg', 0.65);
    socket.emit('video_frame', { image: dataURL });
  }, 100); // 10 FPS cap
}

// ── Glow effect on video panel ────────────────────────────────
const GLOW_MAP = {
  happy:'glow-happy',sad:'glow-sad',angry:'glow-angry',fear:'glow-fear',
  surprise:'glow-surprise',excited:'glow-excited',
};
let currentGlow = '';
function triggerGlow(emotion) {
  const panel = document.getElementById('myPanel');
  if (currentGlow) panel.classList.remove(currentGlow);
  const cls = GLOW_MAP[emotion] || 'glow-neutral';
  panel.classList.add(cls);
  currentGlow = cls;
}

// ── Floating emoji burst ──────────────────────────────────────
let lastFloatEmo = '';
function spawnFloatEmoji(emoji, x, y) {
  const el = document.createElement('div');
  el.className = 'float-emoji';
  el.textContent = emoji;
  el.style.left  = (x || Math.random()*80 + 10) + '%';
  el.style.bottom = '80px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2100);
}

// ── UI updaters ───────────────────────────────────────────────
function updateEmotionUI(face, who) {
  const emoji  = face.emoji  || '😐';
  const label  = face.emotion || 'neutral';
  const score  = Math.round((face.score || 0) * 100);
  const color  = EMO_COLORS[label] || '#94a3b8';

  if (who === 'my') {
    document.getElementById('emoEmoji').textContent  = emoji;
    document.getElementById('emoLabel').textContent  = label;
    document.getElementById('emoScore').textContent  = score + '% confidence';
    document.getElementById('emoLabel').style.color  = color;

    const badge = document.getElementById('myEmoBadge');
    document.getElementById('myEmoIcon').textContent  = emoji;
    document.getElementById('myEmoLabel').textContent = label;
    badge.classList.add('visible');

    // Floating emoji on strong detections
    if (score > 70 && label !== lastFloatEmo) {
      lastFloatEmo = label;
      spawnFloatEmoji(emoji);
    }
  } else {
    const badge = document.getElementById('remoteEmoBadge');
    document.getElementById('remoteEmoIcon').textContent  = emoji;
    document.getElementById('remoteEmoLabel').textContent = label;
    badge.classList.add('visible');
  }
}

function updateEmoBars(all) {
  const container = document.getElementById('emoBars');
  const sorted = Object.entries(all).sort((a,b) => b[1]-a[1]);
  container.innerHTML = sorted.map(([emo, val]) => {
    const pct   = Math.round(val * 100);
    const color = EMO_COLORS[emo] || '#7c3aed';
    return `<div class="emo-bar-row">
      <span class="emo-bar-label">${emo}</span>
      <div class="emo-bar-track">
        <div class="emo-bar-fill" style="width:${pct}%;background:${color}"></div>
      </div>
      <span class="emo-bar-pct">${pct}%</span>
    </div>`;
  }).join('');
}

function updateGestureUI(hands) {
  if (!hands.length) return;
  const h = hands[0];
  document.getElementById('handEmoji').textContent = h.emoji || '✋';
  document.getElementById('handLabel').textContent = h.label || h.gesture;
  document.getElementById('handSide').textContent  = (h.side || '') + ' hand';
  document.getElementById('detectedGestures').innerHTML = hands.map(hh => `
    <div class="gesture-detected">
      <span class="g-emoji">${hh.emoji}</span>
      <div>
        <div class="g-name">${hh.label}</div>
        <div class="g-side">${hh.side} hand</div>
      </div>
    </div>`).join('');
}

function updateMembers() {
  const count = members.length;
  document.getElementById('memberCountBadge').textContent =
    count + ' member' + (count !== 1 ? 's' : '');
  document.getElementById('membersList').innerHTML = members.map(m => `
    <div class="member-item">
      <span class="member-av">${m === MY_NAME ? MY_AVATAR : '👤'}</span>
      <span class="member-name">${escHtml(m)}
        ${m === MY_NAME ? '<span class="member-you">(you)</span>' : ''}
        ${m === ROOM_HOST ? '<span class="host-badge">👑</span>' : ''}
      </span>
    </div>`).join('');
}

// ── FPS counter ───────────────────────────────────────────────
function startFpsCounter() {
  clearInterval(fpsTimer);
  fpsTimer = setInterval(() => {
    document.getElementById('statFps').textContent  = fpsCount + ' fps';
    document.getElementById('fps-badge').textContent = fpsCount + ' fps';
    fpsCount = 0;
  }, 1000);
}

// ── Chat ──────────────────────────────────────────────────────
function sendChat() {
  const el  = document.getElementById('chatInput');
  const msg = el.value.trim();
  if (!msg) return;
  socket.emit('chat_message', { room: ROOM_CODE, message: msg });
  el.value = '';
}

function addChatMsg(data) {
  const container = document.getElementById('chatMessages');
  const isMe      = data.username === MY_NAME;
  const div       = document.createElement('div');
  div.className   = 'chat-msg' + (isMe ? ' me' : '');
  div.innerHTML   = `
    <div class="msg-header">
      <span class="msg-avatar">${data.avatar || '👤'}</span>
      <span class="msg-user">${escHtml(data.username)}</span>
      <span class="msg-time">${data.time}</span>
    </div>
    <div class="msg-text">${escHtml(data.message)}</div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function addSystemMsg(text) {
  const container = document.getElementById('chatMessages');
  const div       = document.createElement('div');
  div.style.cssText = 'text-align:center;color:var(--muted);font-size:0.7rem;padding:3px 0;';
  div.textContent = text;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

// ── Misc ──────────────────────────────────────────────────────
function toggleFilter() {
  filterOn = !filterOn;
  document.getElementById('btnFilter').className = 'ctrl-btn' + (filterOn ? ' active' : ' off');
  addSystemMsg('AI filter ' + (filterOn ? 'ON 🧠' : 'OFF'));
}

function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}

function copyCode() {
  navigator.clipboard.writeText(ROOM_CODE).catch(()=>{});
  const btn = document.querySelector('.copy-btn');
  btn.textContent = '✅ Copied!';
  setTimeout(() => btn.textContent = '📋 Copy', 2000);
}

function takeSnapshot() {
  const vid = document.getElementById('rawVideo');
  const ov  = document.getElementById('myOverlay');
  if (!vid.videoWidth) return;
  const c   = document.createElement('canvas');
  c.width   = vid.videoWidth;
  c.height  = vid.videoHeight;
  const ctx = c.getContext('2d');
  ctx.drawImage(vid, 0, 0);
  if (filterOn && ov.width) ctx.drawImage(ov, 0, 0, c.width, c.height);
  const a      = document.createElement('a');
  a.download   = `emoticam_${Date.now()}.png`;
  a.href       = c.toDataURL();
  a.click();
  addSystemMsg('Snapshot saved 📸');
}

function leaveRoom() {
  socket.emit('leave_room_socket', { code: ROOM_CODE });
  stopCamera();
  window.location.href = '/lobby';
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Gesture reference grid ────────────────────────────────────
document.getElementById('gestureRef').innerHTML =
  GESTURES_REF.map(g =>
    `<div class="g-ref-item">
       <span class="re">${g.e}</span>
       <span class="rl">${g.l}</span>
     </div>`
  ).join('');

// ── Boot ──────────────────────────────────────────────────────
window.addEventListener('load', () => {
  updateMembers();
  startCamera();
});
</script>
