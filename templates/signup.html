<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>EmotiCam — Sign Up</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#070b14;--surface:#0d1424;--card:#111827;
  --border:#1e2d45;--accent:#00d4ff;--accent2:#ff3cac;
  --green:#00ff88;--text:#e2e8f0;--muted:#64748b;
}
body{
  background:var(--bg);color:var(--text);
  font-family:'Outfit',sans-serif;min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  overflow-y:auto;padding:20px;
}
.bg-fx{position:fixed;inset:0;z-index:0;overflow:hidden;}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.2;animation:drift 8s ease-in-out infinite;}
.orb1{width:400px;height:400px;background:#ff3cac;top:-100px;right:-100px;animation-delay:0s;}
.orb2{width:350px;height:350px;background:#00d4ff;bottom:-100px;left:-100px;animation-delay:3s;}
@keyframes drift{0%,100%{transform:translate(0,0);}50%{transform:translate(25px,-15px);}}

.card{
  position:relative;z-index:1;
  background:rgba(13,20,36,0.88);
  border:1px solid var(--border);border-radius:24px;
  padding:44px 44px;width:100%;max-width:480px;
  backdrop-filter:blur(20px);
  box-shadow:0 0 60px rgba(255,60,172,0.08);
}
.logo{text-align:center;margin-bottom:28px;}
.logo-icon{font-size:2.5rem;display:block;margin-bottom:6px;}
.logo h1{font-size:1.8rem;font-weight:900;letter-spacing:-1px;}
.logo h1 span{background:linear-gradient(135deg,var(--accent2),var(--accent));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logo p{color:var(--muted);font-size:0.85rem;margin-top:4px;}

.form-group{margin-bottom:16px;}
label{display:block;font-size:0.75rem;font-weight:600;
  color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:7px;}
input[type=text],input[type=password]{
  width:100%;padding:12px 15px;
  background:rgba(255,255,255,0.04);
  border:1px solid var(--border);border-radius:12px;
  color:var(--text);font-family:'Outfit',sans-serif;font-size:0.93rem;
  outline:none;transition:all 0.2s;
}
input:focus{border-color:var(--accent2);box-shadow:0 0 0 3px rgba(255,60,172,0.12);}
input::placeholder{color:var(--muted);}

/* Avatar picker */
.avatar-picker{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;}
.avatar-opt{
  width:42px;height:42px;border-radius:10px;
  border:2px solid var(--border);background:rgba(255,255,255,0.04);
  font-size:1.4rem;cursor:pointer;display:flex;align-items:center;
  justify-content:center;transition:all 0.15s;
}
.avatar-opt:hover{border-color:var(--accent2);transform:scale(1.1);}
.avatar-opt.selected{border-color:var(--accent2);background:rgba(255,60,172,0.15);
  box-shadow:0 0 12px rgba(255,60,172,0.3);}
#avatarInput{display:none;}

.btn-main{
  width:100%;padding:14px;
  background:linear-gradient(135deg,var(--accent2),#cc0077);
  border:none;border-radius:12px;
  color:#fff;font-family:'Outfit',sans-serif;
  font-size:1rem;font-weight:700;
  cursor:pointer;transition:all 0.2s;margin-top:8px;
}
.btn-main:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(255,60,172,0.35);}
.error{
  background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.3);
  border-radius:10px;padding:11px 14px;
  color:#fca5a5;font-size:0.84rem;margin-bottom:16px;
}
.divider{text-align:center;color:var(--muted);font-size:0.8rem;margin:18px 0;position:relative;}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:40%;height:1px;background:var(--border);}
.divider::before{left:0;}.divider::after{right:0;}
.link-btn{
  display:block;text-align:center;padding:12px;
  border:1px solid var(--border);border-radius:12px;
  color:var(--text);text-decoration:none;font-size:0.9rem;font-weight:600;transition:all 0.2s;
}
.link-btn:hover{border-color:var(--accent);color:var(--accent);}
</style>
</head>
<body>
<div class="bg-fx">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
</div>
<div class="card">
  <div class="logo">
    <span class="logo-icon">✨</span>
    <h1>Join <span>EmotiCam</span></h1>
    <p>Create your account to start video calling</p>
  </div>

  {% if error %}
  <div class="error">⚠️ {{ error }}</div>
  {% endif %}

  <form method="POST">
    <div class="form-group">
      <label>Username</label>
      <input type="text" name="username" placeholder="Choose a username (min 3 chars)" required autocomplete="off"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" placeholder="At least 6 characters" required/>
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" name="confirm" placeholder="Repeat your password" required/>
    </div>
    <div class="form-group">
      <label>Choose Your Avatar</label>
      <div class="avatar-picker">
        {% set avatars = ['😊','🥳','😎','🤩','😇','🦊','🐼','🦁','🐸','🤖','👻','🎭','🦋','🌟','🔥','💎','🎯','🚀','🎸','⚡'] %}
        {% for av in avatars %}
        <div class="avatar-opt {% if loop.first %}selected{% endif %}"
             onclick="selectAvatar(this,'{{ av }}')">{{ av }}</div>
        {% endfor %}
      </div>
      <input type="hidden" name="avatar" id="avatarInput" value="😊"/>
    </div>
    <button type="submit" class="btn-main">Create Account →</button>
  </form>

  <div class="divider">already have an account?</div>
  <a href="/login" class="link-btn">← Sign In</a>
</div>

<script>
function selectAvatar(el, emoji) {
  document.querySelectorAll('.avatar-opt').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('avatarInput').value = emoji;
}
</script>
</body>
</html>
