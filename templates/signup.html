<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>EmotiCam — Sign Up</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════════════════ BASE */
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#070b14; --surface:#0d1424; --card:#0f1729;
  --border:#1e2d45; --accent:#00d4ff; --accent2:#ff3cac;
  --green:#00ff88; --yellow:#fbbf24; --red:#ef4444;
  --text:#e2e8f0; --muted:#64748b;
}
body{
  background:var(--bg); color:var(--text);
  font-family:'Outfit',sans-serif;
  min-height:100dvh; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:20px; position:relative;
}

/* ── Ambient orbs ── */
.orb{
  position:fixed; border-radius:50%; filter:blur(90px);
  pointer-events:none; z-index:0; opacity:0.35;
}
.orb-1{width:500px;height:500px;background:radial-gradient(circle,rgba(255,60,172,0.22),transparent 70%);top:-140px;right:-140px;}
.orb-2{width:440px;height:440px;background:radial-gradient(circle,rgba(0,212,255,0.2),transparent 70%);bottom:-100px;left:-100px;}

/* ── Card ── */
.auth-card{
  position:relative; z-index:10;
  width:100%; max-width:440px;
  background:rgba(13,20,36,0.85);
  border:1px solid var(--border);
  border-radius:24px;
  padding:36px 36px;
  backdrop-filter:blur(24px);
  box-shadow:0 0 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,60,172,0.05);
}

/* ── Logo ── */
.logo{text-align:center;margin-bottom:26px;}
.logo-text{font-size:1.75rem;font-weight:900;letter-spacing:-0.5px;}
.logo-text span{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.logo-sub{font-size:0.75rem;color:var(--muted);margin-top:4px;}

/* ── Error banner ── */
.error-banner{
  background:rgba(239,68,68,0.1);
  border:1px solid rgba(239,68,68,0.35);
  border-radius:10px; padding:10px 14px;
  font-size:0.8rem; color:#fca5a5;
  margin-bottom:18px;
  display:flex; align-items:center; gap:8px;
}

/* ── Fields ── */
.field{margin-bottom:16px;}
.field label{
  display:block; font-size:0.72rem; font-weight:600;
  color:var(--muted); text-transform:uppercase; letter-spacing:1px;
  margin-bottom:7px;
}
.field input{
  width:100%; padding:12px 16px;
  background:rgba(255,255,255,0.04);
  border:1px solid var(--border); border-radius:12px;
  color:var(--text); font-family:'Outfit',sans-serif;
  font-size:0.92rem; outline:none;
  transition:border-color 0.2s, box-shadow 0.2s;
}
.field input:focus{
  border-color:var(--accent2);
  box-shadow:0 0 0 3px rgba(255,60,172,0.1);
}
.field input::placeholder{color:var(--muted);}

/* ── Avatar picker ── */
.avatar-section{margin-bottom:18px;}
.avatar-section label{
  display:block; font-size:0.72rem; font-weight:600;
  color:var(--muted); text-transform:uppercase; letter-spacing:1px;
  margin-bottom:10px;
}
.avatar-preview{
  display:flex; align-items:center; gap:12px;
  margin-bottom:10px;
}
.avatar-display{
  width:52px; height:52px;
  background:rgba(255,255,255,0.04);
  border:2px solid var(--accent);
  border-radius:14px;
  display:flex; align-items:center; justify-content:center;
  font-size:1.8rem;
  box-shadow:0 0 14px rgba(0,212,255,0.2);
  transition:all 0.25s;
}
.avatar-hint{font-size:0.75rem;color:var(--muted);line-height:1.5;}

.emoji-grid{
  display:grid; grid-template-columns:repeat(8,1fr); gap:5px;
}
.emoji-option{
  width:100%; aspect-ratio:1;
  background:rgba(255,255,255,0.03);
  border:1px solid var(--border);
  border-radius:9px; font-size:1.15rem;
  cursor:pointer; transition:all 0.15s;
  display:flex; align-items:center; justify-content:center;
}
.emoji-option:hover{
  background:rgba(0,212,255,0.08);
  border-color:rgba(0,212,255,0.4);
  transform:scale(1.12);
}
.emoji-option.selected{
  background:rgba(0,212,255,0.12);
  border-color:var(--accent);
  box-shadow:0 0 10px rgba(0,212,255,0.25);
  transform:scale(1.12);
}

/* Hidden input that stores chosen avatar */
#avatarInput{display:none;}

/* ── Submit ── */
.btn-primary{
  width:100%; padding:13px;
  background:linear-gradient(135deg,var(--accent2),#cc2090);
  border:none; border-radius:12px;
  color:#fff; font-family:'Outfit',sans-serif;
  font-size:0.95rem; font-weight:700;
  cursor:pointer; transition:all 0.2s;
  margin-top:4px; letter-spacing:0.3px;
}
.btn-primary:hover{
  background:linear-gradient(135deg,#ff5ec4,#e0258b);
  box-shadow:0 0 24px rgba(255,60,172,0.35);
  transform:translateY(-1px);
}
.btn-primary:active{transform:translateY(0);}

/* ── Footer ── */
.auth-footer{
  text-align:center; margin-top:22px;
  font-size:0.82rem; color:var(--muted);
}
.auth-footer a{
  color:var(--accent); text-decoration:none; font-weight:600;
}
.auth-footer a:hover{opacity:0.8; text-decoration:underline;}

/* scrollbar */
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="auth-card">

  <div class="logo">
    <div class="logo-text">Emoti<span>Cam</span> 🎭</div>
    <div class="logo-sub">Create your account — it's free</div>
  </div>

  {% if error %}
  <div class="error-banner">⚠️ {{ error }}</div>
  {% endif %}

  <form method="POST" action="/signup" autocomplete="off" id="signupForm">

    <!-- Avatar picker -->
    <div class="avatar-section">
      <label>Pick Your Avatar</label>
      <div class="avatar-preview">
        <div class="avatar-display" id="avatarDisplay">😊</div>
        <div class="avatar-hint">Choose an emoji that<br>represents you in rooms</div>
      </div>
      <div class="emoji-grid" id="emojiGrid"></div>
      <input type="hidden" name="avatar" id="avatarInput" value="😊"/>
    </div>

    <div class="field">
      <label>Username</label>
      <input type="text" name="username" placeholder="Min 3 characters"
             autocomplete="off" required autofocus minlength="3" maxlength="20"/>
    </div>

    <div class="field">
      <label>Password</label>
      <input type="password" name="password" placeholder="Min 6 characters"
             autocomplete="new-password" required minlength="6"/>
    </div>

    <div class="field">
      <label>Confirm Password</label>
      <input type="password" name="confirm" placeholder="Repeat password"
             autocomplete="new-password" required minlength="6"/>
    </div>

    <button type="submit" class="btn-primary">✨ Create Account</button>

  </form>

  <div class="auth-footer">
    Already have an account?
    <a href="/login">Login →</a>
  </div>

</div>

<script>
// ── Avatar emoji options ──────────────────────────────────────
const AVATARS = [
  '😊','😎','🤩','🥳','😏','🤔','😜','🤗',
  '😇','🥰','😈','👻','🎭','🦊','🐼','🐸',
  '🦁','🐯','🦄','🐉','🤖','👽','🎃','🌟',
  '🔥','⚡','🌈','💎','🎯','🚀','🎮','🎵',
];

let selected = '😊';

function renderGrid() {
  const grid = document.getElementById('emojiGrid');
  grid.innerHTML = AVATARS.map(e => `
    <button type="button" class="emoji-option ${e===selected?'selected':''}"
            onclick="pickAvatar('${e}')" title="${e}">${e}</button>
  `).join('');
}

function pickAvatar(emoji) {
  selected = emoji;
  document.getElementById('avatarDisplay').textContent = emoji;
  document.getElementById('avatarInput').value = emoji;
  renderGrid();
}

renderGrid();

// Client-side password match validation
document.getElementById('signupForm').addEventListener('submit', function(e) {
  const p = this.querySelector('[name=password]').value;
  const c = this.querySelector('[name=confirm]').value;
  if (p !== c) {
    e.preventDefault();
    // Flask will handle the real validation too, but give instant feedback
    alert('Passwords do not match!');
  }
});
</script>

</body>
</html>
